# Pre-commit configuration for SignalSense AI (Local Hooks)
# Run local hooks (end-of-file-fixer, trailing-whitespace) and local Semgrep scan

repos:
  - repo: local
    hooks:
      - id: end-of-file-fixer
        name: Fix End of Files
        entry: end-of-file-fixer
        language: system
        types: [text]
        stages: [pre-commit]

      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [pre-commit]

      - id: semgrep
        name: Semgrep Security Scan
        entry: semgrep --config .agents/semgrep_rules.yml --error
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
